<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪙 Token Clicker — Build Your AI Empire</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- Header / Stats Bar -->
        <header id="stats-bar">
            <div class="stat-group stat-group-tokens" data-tooltip="Tokens are your fuel. Generated by clicking and your Tech Stack. Models drain them to produce Intelligence.">
                <span class="stat-group-label">🪙 TOKENS</span>
                <span id="token-count" class="stat-value">0</span>
                <span id="token-net" class="stat-net"></span>
                <span class="stat-detail"><span id="tps" class="detail-positive">+0</span> earn · <span id="drain-per-sec" class="detail-negative">-0</span> drain</span>
            </div>
            <div class="stat-separator">→</div>
            <div class="stat-group stat-group-iq" data-tooltip="Intelligence is produced by your AI model consuming tokens. Spend it to unlock more powerful models.">
                <span class="stat-group-label">🧠 INTELLIGENCE</span>
                <span id="iq-count" class="stat-value iq">0</span>
                <span id="iq-per-sec" class="stat-rate iq">+0.0/s</span>
            </div>
            <div class="stat-separator">|</div>
            <div class="stat-group stat-group-models" data-tooltip="Your currently active AI models. Each drains tokens to produce Intelligence.">
                <span class="stat-group-label">🤖 ACTIVE <span id="model-slots-display" class="slots-badge">0/1</span></span>
                <div id="active-models-bar" class="active-models-bar">
                    <span class="no-models">None</span>
                </div>
            </div>
        </header>

        <main id="main-area">
            <!-- Left: Click Zone -->
            <section id="click-zone">
                <div id="click-button-wrapper">
                    <button id="click-button">
                        <span class="click-icon">🧠</span>
                        <span class="click-text">Generate Tokens</span>
                    </button>
                </div>
                <div id="click-particles"></div>

                <!-- Events / Notifications -->
                <div id="event-log">
                    <div class="log-entry welcome">Welcome to Token Clicker! Click the brain to start generating tokens.</div>
                </div>
            </section>

            <!-- Right: Shop -->
            <section id="shop">
                <div class="shop-tabs">
                    <button class="tab active" data-tab="buildings">🛠️ Tech Stack</button>
                    <button class="tab" data-tab="upgrades">⬆️ Upgrades</button>
                    <button class="tab" data-tab="models">🤖 Models</button>
                </div>

                <div id="tab-buildings" class="tab-content active">
                    <div id="buildings-list"></div>
                </div>

                <div id="tab-upgrades" class="tab-content">
                    <div id="upgrades-list"></div>
                </div>

                <div id="tab-models" class="tab-content">
                    <div id="model-shop-info"></div>
                    <div id="models-list"></div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer id="game-footer">
            <button id="save-btn" class="footer-btn">💾 Save</button>
            <button id="reset-btn" class="footer-btn danger">🗑️ Reset</button>
            <span id="last-save">Auto-saves every 30s</span>
        </footer>
        <!-- Model Selection Dialog -->
        <div id="model-select-overlay" class="modal-overlay hidden">
            <div class="modal">
                <h2 class="modal-title">🤖 Choose Your Starting Model</h2>
                <p class="modal-subtitle">Every AI empire starts somewhere. Pick your first model:</p>
                <div id="model-select-grid"></div>
            </div>
        </div>
    </div>

    <script src="js/buildings.js"></script>
    <script src="js/upgrades.js"></script>
    <script src="js/companies.js"></script>
    <script src="js/save.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
